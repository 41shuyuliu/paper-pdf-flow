<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>论文流程助手（本地模式）</title>
    <style>
      :root {
        --bg: #f7f8fb;
        --card: #ffffff;
        --line: #d7dce5;
        --text: #1c2430;
        --muted: #5f6977;
        --primary: #0b63d8;
        --danger: #c62828;
        --success: #2e7d32;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 380px;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .wrap {
        padding: 12px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--card);
        padding: 10px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 16px;
      }

      label {
        display: block;
        font-size: 12px;
        margin-top: 8px;
      }

      input[type="text"],
      input[type="file"] {
        width: 100%;
        margin-top: 4px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 12px;
        background: #fff;
      }

      button {
        width: 100%;
        margin-top: 10px;
        border: 0;
        border-radius: 8px;
        padding: 10px 12px;
        font-weight: 600;
        font-size: 13px;
        color: #fff;
        background: var(--primary);
        cursor: pointer;
      }

      button[disabled] {
        opacity: 0.65;
        cursor: not-allowed;
      }

      .status-box {
        margin-top: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px;
        min-height: 76px;
        background: #fbfcff;
      }

      .status-line {
        font-size: 12px;
        color: var(--muted);
        min-height: 18px;
      }

      .status-line.error {
        color: var(--danger);
      }

      .status-line.success {
        color: var(--success);
      }

      .progress {
        margin-top: 8px;
        width: 100%;
        height: 8px;
        border-radius: 999px;
        background: #e8edf5;
        overflow: hidden;
      }

      .progress-bar {
        width: 0%;
        height: 100%;
        background: var(--primary);
        transition: width 120ms linear;
      }

      .meta {
        margin-top: 8px;
        font-size: 11px;
        color: var(--muted);
        min-height: 16px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>论文流程助手</h1>

        <label for="pdfFile">PDF 文件</label>
        <input id="pdfFile" type="file" accept=".pdf,application/pdf" />

        <label for="outputName">输出文件名（.md）</label>
        <input id="outputName" type="text" placeholder="可选，例如 note.md" />

        <button id="startBtn" type="button">开始本地生成</button>

        <div class="status-box">
          <div id="statusLine" class="status-line">空闲</div>
          <div class="progress"><div id="progressBar" class="progress-bar"></div></div>
          <div id="metaLine" class="meta"></div>
        </div>
      </div>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
